# myBuilds — development orchestration.
# Usage:  cp .env.example .env  &&  docker compose up -d --build
services:
  mariadb:
    image: mariadb:11.3
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - ./volumes/mariadb:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-submittal_db}
      MARIADB_USER: ${MARIADB_USER:-submittal_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-password}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [submittal-network]
    restart: unless-stopped

  mongodb:
    # NOTE: pinned to 4.4 because MongoDB 5.0+ requires a CPU with AVX support,
    # which this dev host lacks. Bump to mongo:7.0 on AVX-capable hardware
    # (and switch the healthcheck below back to `mongosh`).
    image: mongo:4.4
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - ./volumes/mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ADMIN_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ADMIN_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-submittal_db}
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [submittal-network]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./volumes/redis:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [submittal-network]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./volumes/documents:/app/data/documents
      - ./volumes/generated_pdfs:/app/data/generated_pdfs
    env_file: [.env]
    environment:
      DATABASE_URL: mysql+pymysql://${MARIADB_USER:-submittal_user}:${MARIADB_PASSWORD:-password}@mariadb:3306/${MARIADB_DATABASE:-submittal_db}
      MONGODB_URL: mongodb://${MONGODB_ADMIN_USER:-admin}:${MONGODB_ADMIN_PASSWORD:-password}@mongodb:27017/${MONGODB_DATABASE:-submittal_db}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-password}@redis:6379/2
    depends_on:
      mariadb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [submittal-network]
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend/app:/app/app
      - ./volumes/generated_pdfs:/app/data/generated_pdfs
    env_file: [.env]
    environment:
      DATABASE_URL: mysql+pymysql://${MARIADB_USER:-submittal_user}:${MARIADB_PASSWORD:-password}@mariadb:3306/${MARIADB_DATABASE:-submittal_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-password}@redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks: [submittal-network]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8100/api/v1}
      VITE_APP_NAME: ${VITE_APP_NAME:-myBuilds}
    depends_on:
      backend:
        condition: service_started
    networks: [submittal-network]
    restart: unless-stopped

networks:
  submittal-network:
    driver: bridge
